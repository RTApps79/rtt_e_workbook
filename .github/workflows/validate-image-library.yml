name: Validate image library

on:
  push:
    paths:
      - "apps/patient_library/image_sets/**"
      - "apps/patient_library/rtapps_image_library/tools/image_library/**"
      - ".github/workflows/validate-image-library.yml"
  pull_request:
    paths:
      - "apps/patient_library/image_sets/**"
      - "apps/patient_library/rtapps_image_library/tools/image_library/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate manifests and files
        run: python apps/patient_library/rtapps_image_library/tools/image_library/validate_image_library.py --repo-root .

