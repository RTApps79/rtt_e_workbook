<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaction Interceptor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #1a202c; }
        #game-container { width: 100%; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #sim-area { background-image: radial-gradient(circle at center, #2d3748, #1a202c); }
        .sim-particle { position: absolute; border-radius: 50%; }
        .nucleus { width: 40px; height: 40px; background: #9ca3af; transition: background-color 0.2s; }
        .nucleus.hot { background-color: #ef4444; animation: shimmer 0.5s ease-in-out; }
        @keyframes shimmer { 50% { box-shadow: 0 0 15px 5px rgba(239, 68, 68, 0.7); } }
        .electron { width: 10px; height: 10px; background: #3b82f6; }
        .photon { width: 6px; height: 15px; background: gold; border-radius: 2px; }
        .choice-btn { transition: all 0.2s ease-in-out; }
        .choice-btn:hover:not(:disabled) { transform: translateY(-5px); }
        #timer-bar { transition: width 0.1s linear; }
        #start-screen, #game-over-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(26,32,44, 0.95); z-index: 200; }
    </style>
</head>
<body class="text-white">

    <div id="game-container">
        <!-- Header -->
        <header class="p-4 flex justify-between items-center bg-gray-900/50 z-50">
            <div><h1 class="text-xl font-bold text-yellow-300">Interaction Interceptor</h1></div>
            <div class="text-right">
                <p class="text-lg">Score: <span id="score" class="font-bold text-green-400">0</span></p>
                <p class="text-lg">Strikes: <span id="lives" class="font-bold text-red-400">⚡⚡⚡</span></p>
            </div>
        </header>

        <!-- Game Area -->
        <main id="sim-area" class="flex-grow relative p-8"></main>
        
        <!-- Timer Bar -->
        <div class="h-2 bg-gray-700"><div id="timer-bar" class="h-full bg-yellow-400"></div></div>

        <!-- Player Controls -->
        <footer class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4 bg-gray-900/50 z-10">
            <button data-choice="elastic" class="choice-btn bg-gray-500 hover:bg-gray-600 p-4 rounded-lg">Elastic Collision</button>
            <button data-choice="inelastic" class="choice-btn bg-purple-500 hover:bg-purple-600 p-4 rounded-lg">Inelastic Collision</button>
            <button data-choice="brems" class="choice-btn bg-orange-500 hover:bg-orange-600 p-4 rounded-lg">Bremsstrahlung</button>
            <button data-choice="char" class="choice-btn bg-pink-500 hover:bg-pink-600 p-4 rounded-lg">Characteristic</button>
        </footer>
    </div>
    
    <!-- Screens -->
    <div id="start-screen" class="flex flex-col justify-center items-center text-center p-8">
        <h2 class="text-4xl font-bold mb-4 text-yellow-200">Identify the Interaction!</h2>
        <p class="text-xl mb-8 text-gray-300">Watch the animation closely, then click the button for the interaction you saw before time runs out.</p>
        <button id="start-button" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-2xl animate-pulse">Start Game</button>
    </div>
    <div id="game-over-screen" class="hidden flex-col justify-center items-center text-center p-8">
        <h2 class="text-5xl font-bold mb-4 text-red-500">Game Over</h2>
        <p class="text-2xl mb-2 text-gray-300">Final Score: <span id="final-score" class="font-bold text-green-400">0</span></p>
        <button id="restart-button" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-lg text-2xl mt-8">Play Again</button>
    </div>

    <!-- Audio -->
    <audio id="correct-sound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c3b092323a.mp3" preload="auto"></audio>
    <audio id="incorrect-sound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_a437c06b29.mp3" preload="auto"></audio>
    
    <script>
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');
        const finalScoreDisplay = document.getElementById('final-score');
        const timerBar = document.getElementById('timer-bar');
        const simArea = document.getElementById('sim-area');
        const choiceBtns = document.querySelectorAll('.choice-btn');

        let score = 0, lives = 3, gameIsRunning = false;
        let gameTimeout, timeLimit = 5000;
        let currentInteraction = '';
        let animationFrameId;

        function playAudio(id) {
            const sound = document.getElementById(id);
            if(sound) { sound.currentTime = 0; sound.play().catch(e => {}); }
        }
        
        function animate(element, keyframes, duration) {
            if (!element) return;
            const anim = element.animate(keyframes, { duration, easing: 'ease-out', fill: 'forwards' });
            anim.onfinish = () => {
                 if (!element.classList.contains("target-e")) {
                     element.remove();
                 }
            };
            return anim;
        }

        function playInteractionAnimation() {
            simArea.innerHTML = '';
            setButtonsDisabled(true);
            const rand = Math.random();
            
            const nucleus = document.createElement('div');
            nucleus.className = 'sim-particle nucleus';
            nucleus.style.left = '75%';
            nucleus.style.top = '50%';
            nucleus.style.transform = 'translate(-50%, -50%)';
            simArea.appendChild(nucleus);
            
            const outerE = document.createElement('div');
            outerE.className = 'sim-particle electron target-e';
            outerE.style.top = `calc(50% - 60px)`;
            outerE.style.left = `calc(75% - 60px)`;
            simArea.appendChild(outerE);
            
            const innerE = document.createElement('div');
            innerE.className = 'sim-particle electron target-e';
            innerE.style.top = `50%`;
            innerE.style.left = `calc(75% + 40px)`;
            simArea.appendChild(innerE);

            const incidentE = document.createElement('div');
            incidentE.className = 'sim-particle electron';
            incidentE.style.left = '-20px';
            incidentE.style.top = '50%';
            simArea.appendChild(incidentE);
            
            const mainAnim = incidentE.animate([{ left: 'calc(75% - 50px)' }], { duration: 1200, easing: 'ease-in' });

            mainAnim.onfinish = () => {
                if (rand < 0.25) { // Elastic
                    currentInteraction = 'elastic';
                    nucleus.classList.add('hot');
                    animate(incidentE, [{transform: 'translate(-100px, -100px) rotate(20deg)'}], 800);
                } else if (rand < 0.5) { // Inelastic
                    currentInteraction = 'inelastic';
                    nucleus.classList.add('hot');
                    animate(outerE, [{transform: 'translate(50px, 150px) rotate(-30deg)'}], 800);
                    animate(incidentE, [{transform: 'translate(80px, -120px) rotate(45deg)'}], 800);
                } else if (rand < 0.75) { // Brems
                    currentInteraction = 'brems';
                    const photon = document.createElement('div');
                    photon.className = 'sim-particle photon';
                    photon.style.left = incidentE.style.left;
                    photon.style.top = incidentE.style.top;
                    incidentE.animate([ { transform: 'translate(0, 0)'}, { transform: 'translate(20px, -40px)'}, { transform: 'translate(100px, -150px) rotate(-30deg)'} ], {duration: 800}).onfinish = () => incidentE.remove();
                    animate(photon, [{transform: 'translate(200px, 50px) rotate(20deg)'}], 800);
                } else { // Characteristic
                    currentInteraction = 'char';
                    animate(innerE, [{transform: 'translate(100px, 100px) rotate(45deg)'}], 500);
                    setTimeout(() => {
                        animate(outerE, [{top: innerE.style.top, left: innerE.style.left}], 300).onfinish = () => {
                            const photon = document.createElement('div');
                            photon.className = 'sim-particle photon bg-pink-500';
                            photon.style.left = outerE.style.left;
                            photon.style.top = outerE.style.top;
                            animate(photon, [{transform: 'translate(150px, -100px) rotate(-15deg)'}], 800);
                        };
                    }, 200);
                    animate(incidentE, [{transform: 'translate(-120px, 100px) rotate(25deg)'}], 800);
                }
                startTimer();
                setButtonsDisabled(false);
            };
        }

        function startTimer() {
            clearTimeout(gameTimeout);
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            requestAnimationFrame(() => {
                timerBar.style.transition = `width ${timeLimit / 1000}s linear`;
                timerBar.style.width = '0%';
            });
            gameTimeout = setTimeout(() => checkAnswer('timeout'), timeLimit);
        }

        function checkAnswer(choice) {
            clearTimeout(gameTimeout);
            setButtonsDisabled(true);

            if (choice === 'timeout') {
                lives--;
                playAudio('incorrect-sound');
            } else if (choice === currentInteraction) {
                score += 10;
                playAudio('correct-sound');
            } else {
                lives--;
                playAudio('incorrect-sound');
            }
            
            scoreDisplay.textContent = score;
            livesDisplay.textContent = '⚡'.repeat(lives);

            if (lives <= 0) {
                setTimeout(endGame, 1000);
            } else {
                setTimeout(playInteractionAnimation, 1000);
            }
        }
        
        function setButtonsDisabled(isDisabled) {
            choiceBtns.forEach(btn => btn.disabled = isDisabled);
        }

        function stopGame() {
            gameIsRunning = false;
            clearTimeout(gameTimeout);
            cancelAnimationFrame(animationFrameId);
        }

        function startGame() {
            gameIsRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            score = 0; lives = 3; timeLimit = 5000;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = '⚡'.repeat(lives);
            
            stopGame();
            playInteractionAnimation();
        }

        function endGame() {
            if (!gameIsRunning) return;
            stopGame();
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.remove('hidden');
            gameOverScreen.classList.add('flex');
        }

        choiceBtns.forEach(btn => btn.addEventListener('click', () => checkAnswer(btn.dataset.choice)));
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
    </script>
</body>
</html>
